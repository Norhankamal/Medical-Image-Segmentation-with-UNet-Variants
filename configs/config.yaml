# Data Settings
# Raw data on Google Drive - mounted in Colab
# All images converted to RGB by Student A preprocessing
data:
  raw_dir          : /content/drive/MyDrive/Medical_Segmentation_Data/raw/stage1_train/
  preprocessed_dir : /content/drive/MyDrive/Medical_Segmentation_Data/preprocessed
  img_size    : 256
  num_workers : 2
  train_split : 0.70
  val_split   : 0.15
  test_split  : 0.15
  seed        : 42

# Model Settings
# in_channels=3  — Student A converts all RGBA images to RGB
# out_channels=1 — binary segmentation (nucleus vs background)
model:
  in_channels  : 3
  out_channels : 1
  name         : unet

# Training Settings
training:
  epochs      : 30
  batch_size  : 8
  lr          : 0.001     # HIGH learning rate
  lr_patience : 5
  lr_factor   : 0.5

# Loss Settings
# Combined loss = BCE + Dice
# Dice handles class imbalance (13.9% foreground / 86.1% background)
loss:
  bce_weight  : 1.0
  dice_weight : 1.0

# Paths
paths:
  checkpoint_dir : checkpoints/
  best_model     : checkpoints/best_model.pth
  figures_dir    : reports/figures/
  metrics_file   : reports/figures/metrics.txt

# Evaluation
evaluation:
  threshold : 0.5

# Augmentation Settings
# Applied to training set only — val/test are never augmented
# Pipeline defined in notebooks/03_Augmentation.ipynb
augmentation:
  enabled        : true
  n_aug          : 5          # augmented copies per sample → 469 × 6 = 2,814 total
  aug_data_path  : /content/drive/MyDrive/Medical_Segmentation_Data/preprocessed/train_aug.npz
  elastic_alpha  : 40         # scales Gaussian-smoothed displacement field
  elastic_sigma  : 7.0        # deformation smoothness
  coarse_dropout_holes  : 8
  coarse_dropout_height : 16
  coarse_dropout_width  : 16  
